function surpriseMe() {
  const all = C;
  const pick = all[Math.floor(Math.random() * all.length)];
  // Reset filters
  document.getElementById('search').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-spirit').value = '';
  document.getElementById('f-prep').value = '';
  document.getElementById('f-country').value = '';
  document.getElementById('f-source').value = '';
  ACTV.l1 = false; ACTV.fav = false; SHOW_FAVS = false;
  document.getElementById('bl1').classList.remove('on');
  document.getElementById('bfav').classList.remove('on');
  document.getElementById('btn-favs').classList.remove('active');
  // Open the card
  if (!OPEN.has(pick.name)) OPEN.add(pick.name);
  doFilter();
  setTimeout(() => {
    const el = document.querySelector(`.card[data-name="${pick.name.replace(/"/g,'\\"')}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.boxShadow = '0 0 20px rgba(200,148,58,0.4)';
      el.style.transition = 'box-shadow .3s';
      setTimeout(() => { el.style.boxShadow = ''; }, 2500);
    }
  }, 150);
}

function renderMyBar() {
  const body = document.getElementById('mybar-body');
  let html = '';

    html += `<div class="bar-cat"><div class="bar-cat-title">${cat}</div><div class="bar-grid">`;

function updateBarResults() {
  const el = document.getElementById('bar-results');
  if (!MY_BAR.size) { el.innerHTML = '<p style="color:var(--cream3);font-style:italic">Select ingredients above to see what you can make.</p>'; return; }

  const results = C.map(c => {
    const needed = c.ing.filter(i => i.t !== 'garnish');
    let have = 0, missing = [];
    needed.forEach(i => {
      const mapped = normalizeIng(i.n);
      if (mapped && MY_BAR.has(mapped)) have++;
      else missing.push(i.n);
    });
    const pct = needed.length ? Math.round((have/needed.length)*100) : 0;
    return { name: c.name, pct, missing, total: needed.length, have };
  }).filter(r => r.pct > 0).sort((a,b) => b.pct - a.pct || a.missing.length - b.missing.length);

  const full = results.filter(r => r.pct === 100);
  const partial = results.filter(r => r.pct > 0 && r.pct < 100).slice(0, 15);

  let html = `<div style="font-size:12px;color:var(--gold);margin-bottom:8px;font-family:'Playfair Display',serif;font-style:italic">You can make <strong>${full.length}</strong> cocktail${full.length!==1?'s':''} with what you have</div>`;

  if (full.length) {
    html += full.map(r => `<div class="bar-match" onclick="closeMyBar();scrollToCard('${r.name.replace(/'/g,"\\'")}')">${r.name} <span class="bar-match-pct">✓ 100%</span></div>`).join('');
  }
  if (partial.length) {
    html += `<div style="margin-top:12px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cream3);font-family:'JetBrains Mono',monospace">Almost there — missing 1-2 ingredients:</div>`;
    html += partial.map(r => `<div class="bar-match" onclick="closeMyBar();scrollToCard('${r.name.replace(/'/g,"\\'")}')">${r.name} <span class="bar-match-pct">${r.pct}%</span><div class="bar-missing">Missing: ${r.missing.join(', ')}</div></div>`).join('');
  }
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
function scaleTo(safeName, n, btn) {
  // Update active button
  btn.parentElement.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Scale amounts
  const table = document.getElementById('itbl-' + safeName);
  if (!table) return;
  table.querySelectorAll('td.ia').forEach(td => {
    const base = td.getAttribute('data-base');
    const scalable = td.getAttribute('data-scalable') === 'true';
    if (scalable && !isNaN(parseFloat(base))) {
      const scaled = (parseFloat(base) * n);
      td.textContent = scaled % 1 === 0 ? scaled.toString() : scaled.toFixed(2).replace(/0$/, '');
    } else if (n > 1 && base && !isNaN(parseInt(base))) {
      // Handle "2 dashes" type amounts
      const match = base.match(/^(\d+)\s*(.*)$/);
      if (match) td.textContent = (parseInt(match[1]) * n) + ' ' + match[2];
    }
  });
}

  const container = document.getElementById('rsrc-' + safeName);
  if (container) container.querySelectorAll('.rsrc-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Show/hide panes
  const card = btn.closest('.rp');
  if (!card) return;
  card.querySelectorAll('.rsrc-pane').forEach(p => p.style.display = 'none');
  const target = document.getElementById('rsrc-' + safeName + '-' + src);
  if (target) target.style.display = 'block';
}

const GAL_LOADED = new Set();

function loadGallery(cocktailName, safeName) {
  if (GAL_LOADED.has(safeName)) return;
  GAL_LOADED.add(safeName);
  
  const hero = document.getElementById('galh-' + safeName);
  const grid = document.getElementById('galg-' + safeName);
  if (!hero || !grid) return;
  
  const searchName = DB_NAMES[cocktailName] || cocktailName;
  
  // Load main photo
  fetch('https://www.thecocktaildb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(searchName))
    .then(r => r.json())
    .then(d => {
      if (d.drinks && d.drinks[0]) {
        const drink = d.drinks[0];
        const url = drink.strDrinkThumb;
        hero.innerHTML = `<img src="${url}" alt="${cocktailName}" onload="this.classList.add('loaded')" style="opacity:0">
          <div style="position:absolute;bottom:12px;left:16px;font-size:9px;color:var(--cream3);letter-spacing:.08em">📷 TheCocktailDB</div>`;
        
        // Load related cocktails by first letter for grid
        const letter = cocktailName.charAt(0);
        fetch('https://www.thecocktaildb.com/api/json/v1/1/search.php?f=' + letter)
          .then(r => r.json())
          .then(d2 => {
            if (d2.drinks) {
              const related = d2.drinks
                .filter(dr => dr.strDrink !== drink.strDrink && dr.strDrinkThumb)
                .slice(0, 6);
              if (related.length > 0) {
                grid.innerHTML = related.map(dr => 
                  `<img src="${dr.strDrinkThumb}/preview" alt="${dr.strDrink}" title="${dr.strDrink}" 
                    onload="this.classList.add('loaded')" style="opacity:0"
                    onclick="window.open('${dr.strDrinkThumb}','_blank')">`
                ).join('');
              }
            }
          }).catch(() => {});
      } else {
        hero.innerHTML = `<div style="padding:40px;text-align:center;color:var(--cream3);font-style:italic">No photo available for this cocktail</div>`;
      }
    })
    .catch(() => {
      hero.innerHTML = `<div style="padding:40px;text-align:center;color:var(--cream3)">Offline — photos unavailable</div>`;
    });
}

{from:"Lemon Juice",to:"Lime Juice",cocktails:["Whiskey Sour","Sidecar","French 75","Tom Collins"],note:"Lime is sharper and more tropical. Lemon is rounder and sweeter. Generally interchangeable in sours at 1:1 ratio — the difference is subtle but real.",tags:["easier"]},
{from:"Lime Juice",to:"Lemon Juice",cocktails:["Daiquiri","Margarita","Gimlet","Mojito"],note:"Lemon softens the drink slightly. In a Daiquiri it's less traditional but perfectly fine. Margarita purists might object.",tags:["easier","milder"]},

// ── BITTERS ──
{from:"Angostura Bitters",to:"Peychaud's Bitters",cocktails:["Old Fashioned","Manhattan","Whiskey Sour"],note:"Peychaud's is lighter, more floral, with anise notes. An Old Fashioned with Peychaud's leans toward Sazerac territory. Beautiful and different.",tags:["different"]},
{from:"Angostura Bitters",to:"Orange Bitters",cocktails:["Old Fashioned","Manhattan","Classic Martini"],note:"Citrusy brightness instead of warm spice. Many top bartenders use a combo of both Angostura + orange in their Old Fashioned.",tags:["different","milder"]},

// ── CREAM & DAIRY ──
{from:"Heavy Cream",to:"Oat Milk",cocktails:["White Russian","Classic Eggnog","Ramos Gin Fizz"],note:"Vegan swap. Oat milk froths well and has natural sweetness. Barista-style oat milk (Oatly) works best — the extra fat content matters.",tags:["different","milder"]},
{from:"Egg White",to:"Aquafaba (Chickpea Water)",cocktails:["Whiskey Sour","Pisco Sour","Clover Club","Ramos Gin Fizz"],note:"Vegan foam that's virtually indistinguishable from egg white. Use 1oz aquafaba per 1 egg white. Dry shake first, just like eggs. No one will know the difference.",tags:["easier","different"]},

// ── MIXERS ──
{from:"Tonic Water",to:"Elderflower Tonic",cocktails:["Seedlip Garden & Tonic"],note:"Fever-Tree Elderflower Tonic adds a floral dimension. Works with gin too — a G&T with elderflower tonic is gorgeous.",tags:["different"]},
{from:"Ginger Beer",to:"Ginger Ale",cocktails:["Moscow Mule","Dark & Stormy"],note:"Much milder ginger flavor. The drink becomes smoother but loses its 'bite.' Fine in a pinch but ginger beer is always preferred.",tags:["milder","easier"]},
{from:"Club Soda",to:"Sparkling Water (Topo Chico/Pellegrino)",cocktails:["Mojito","Tom Collins","Aperol Spritz"],note:"Premium sparkling water has finer bubbles and mineral character. Topo Chico's aggressive carbonation makes it the bartender favorite.",tags:["easier"]},

// ── FULL SPIRIT SWAPS (NA) ──
{from:"Vodka",to:"Seedlip Spice 94",cocktails:["Moscow Mule","Cosmopolitan","Espresso Martini"],note:"Warm, aromatic NA spirit with allspice and cardamom. Won't perfectly replicate vodka (nothing will) but provides body and complexity.",tags:["na"]},
{from:"Rum",to:"Lyre's Dark Cane Spirit",cocktails:["Mojito","Dark & Stormy","Mai Tai"],note:"Non-alcoholic rum alternative with molasses and vanilla notes. Combine with real ginger beer for a convincing NA Dark & Stormy.",tags:["na"]},
{from:"Tequila",to:"Lyre's Agave Blanco",cocktails:["Margarita","Paloma"],note:"NA agave spirit. Use with fresh lime and agave syrup for a Virgin Margarita that's better than most bar versions.",tags:["na"]},

// ── SPECIFIC COCKTAIL RIFFS ──
{from:"Amaro Nonino",to:"Averna",cocktails:["Paper Plane"],note:"Averna is darker, more bitter, more herbal. Changes the Paper Plane's character — darker and more brooding. Both are legitimate amari, just different personalities.",tags:["different"]},
{from:"Amaro Nonino",to:"Aperol + Honey Syrup",cocktails:["Paper Plane"],note:"Can't find Nonino? .5oz Aperol + .25oz honey syrup approximates its bittersweet, honeyed character. Not perfect but surprisingly close.",tags:["easier"]},
{from:"Bénédictine",to:"Yellow Chartreuse",cocktails:["Vieux Carré","Singapore Sling"],note:"Both are herbal-honey French liqueurs. Yellow Chartreuse is drier with more alpine herbs. The Vieux Carré becomes slightly more assertive.",tags:["different"]},
{from:"Absinthe",to:"Pastis (Pernod/Ricard)",cocktails:["Sazerac","Corpse Reviver No. 2"],note:"Same anise family, lower proof, more accessible. For a Sazerac rinse, Pernod works identically. Nobody will taste the difference in a rinse.",tags:["easier","milder"]},
{from:"Absinthe",to:"Herbsaint",cocktails:["Sazerac"],note:"The New Orleans substitute created during Prohibition when absinthe was banned. Some purists actually prefer it in a Sazerac — it's the historically 'correct' choice.",tags:["different","easier"]},
{from:"Prosecco",to:"Crémant or Cava",cocktails:["Aperol Spritz","Bellini","Negroni Sbagliato","Hugo Spritz","French 75"],note:"Crémant (French) and Cava (Spanish) are both excellent alternatives. Often better quality for the price. Nobody puts Prosecco in a blind taste test and wins.",tags:["easier"]},
{from:"Champagne",to:"Prosecco or Cava",cocktails:["French 75","Champagne Cocktail","Kir Royale"],note:"In a cocktail with 3+ ingredients, Champagne's subtlety is lost. Save the expensive stuff for drinking straight — Prosecco works perfectly in cocktails.",tags:["easier","milder"]},
];

// Q&A FLOW STATE
let swapMode = 'ingredient'; // 'ingredient', 'cocktail', 'qa'
let swapQAStep = 0;
let swapQAAnswers = {};
let swapSelectedIng = null;
let swapSelectedCocktail = null;

function openSwapLab() {
  document.getElementById('swap-modal').classList.add('show');
  renderSwapLab();
}
function closeSwapLab() {
  document.getElementById('swap-modal').classList.remove('show');
}
document.getElementById('swap-modal')?.addEventListener('click', e => { if (e.target === e.currentTarget) closeSwapLab(); });

function renderSwapLab() {
  const body = document.getElementById('swap-body');
  body.innerHTML = `
    <div class="swap-modes">
      <div class="swap-mode${swapMode==='ingredient'?' active':''}" onclick="setSwapMode('ingredient')">
        <div class="swap-mode-icon">🍶</div>
        <div class="swap-mode-label">By Ingredient</div>
      </div>
      <div class="swap-mode${swapMode==='cocktail'?' active':''}" onclick="setSwapMode('cocktail')">
        <div class="swap-mode-icon">🍸</div>
        <div class="swap-mode-label">By Cocktail</div>
      </div>
      <div class="swap-mode${swapMode==='qa'?' active':''}" onclick="setSwapMode('qa')">
        <div class="swap-mode-icon">💬</div>
        <div class="swap-mode-label">Q&A Guide</div>
      </div>
    </div>
    <div id="swap-content"></div>
  `;
  if (swapMode === 'ingredient') renderSwapByIngredient();
  else if (swapMode === 'cocktail') renderSwapByCocktail();
  else renderSwapQA();
}

function setSwapMode(m) { swapMode = m; swapSelectedIng = null; swapSelectedCocktail = null; swapQAStep = 0; swapQAAnswers = {}; renderSwapLab(); }

// ── MODE 1: BY INGREDIENT ──
function renderSwapByIngredient() {
  const el = document.getElementById('swap-content');
  const allFrom = [...new Set(SUBS_DB.map(s => s.from))].sort();
  const allTo = [...new Set(SUBS_DB.map(s => s.to))].sort();
  const allIngs = [...new Set([...allFrom, ...allTo])].sort();

  let html = `<div class="swap-step">
    <div class="swap-step-title"><span class="swap-step-num">1</span> What ingredient do you have (or want to swap)?</div>
    <input type="text" class="swap-search" placeholder="Search ingredients…" oninput="filterSwapIngs(this.value)" id="swap-ing-search">
    <div class="swap-grid" id="swap-ing-grid">`;
  allFrom.forEach(ing => {
    html += `<button class="swap-chip${swapSelectedIng===ing?' sel':''}" onclick="selectSwapIng('${ing.replace(/'/g,"\\'")}')">${ing}</button>`;
  });
  html += `</div></div>`;

  if (swapSelectedIng) {
    // Show what this ingredient can replace / be replaced by
    const asFrom = SUBS_DB.filter(s => s.from === swapSelectedIng);
    const asTo = SUBS_DB.filter(s => s.to === swapSelectedIng);

    if (asFrom.length) {
      html += `<div class="swap-step">
        <div class="swap-step-title"><span class="swap-step-num">2</span> Replace ${swapSelectedIng} with…</div>
        <div class="swap-results">`;
      asFrom.forEach(s => {
        html += swapCardHTML(s.to, s.from, s.cocktails, s.note, s.tags, 'replace');
      });
      html += `</div></div>`;
    }
    if (asTo.length) {
      html += `<div class="swap-step">
        <div class="swap-step-title"><span class="swap-step-num">${asFrom.length?'3':'2'}</span> Use ${swapSelectedIng} instead of…</div>
        <div class="swap-results">`;
      asTo.forEach(s => {
        html += swapCardHTML(swapSelectedIng, s.from, s.cocktails, s.note, s.tags, 'use');
      });
      html += `</div></div>`;
    }
  }
  el.innerHTML = html;
}

function filterSwapIngs(q) {
  const grid = document.getElementById('swap-ing-grid');
  if (!grid) return;
  grid.querySelectorAll('.swap-chip').forEach(ch => {
    ch.style.display = ch.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function selectSwapIng(ing) {
  swapSelectedIng = (swapSelectedIng === ing) ? null : ing;
  renderSwapByIngredient();
}

// ── MODE 2: BY COCKTAIL ──
function renderSwapByCocktail() {
  const el = document.getElementById('swap-content');
  const allCocktails = [...new Set(SUBS_DB.flatMap(s => s.cocktails))].sort();

  let html = `<div class="swap-step">
    <div class="swap-step-title"><span class="swap-step-num">1</span> Which cocktail do you want to modify?</div>
    <input type="text" class="swap-search" placeholder="Search cocktails…" oninput="filterSwapCocktails(this.value)" id="swap-ctail-search">
    <div class="swap-grid" id="swap-ctail-grid">`;
  allCocktails.forEach(name => {
    html += `<button class="swap-chip${swapSelectedCocktail===name?' sel':''}" onclick="selectSwapCocktail('${name.replace(/'/g,"\\'")}')">${name}</button>`;
  });
  html += `</div></div>`;

  if (swapSelectedCocktail) {
    const subs = SUBS_DB.filter(s => s.cocktails.includes(swapSelectedCocktail));
    if (subs.length) {
      html += `<div class="swap-step">
        <div class="swap-step-title"><span class="swap-step-num">2</span> Available swaps for ${swapSelectedCocktail}</div>
        <div class="swap-results">`;
      subs.forEach(s => {
        html += swapCardHTML(s.to, s.from, [swapSelectedCocktail], s.note, s.tags, 'replace');
      });
      html += `</div></div>`;
    } else {
      html += `<div class="swap-empty">No recorded substitutions for ${swapSelectedCocktail} yet.</div>`;
    }
  }
  el.innerHTML = html;
}

function filterSwapCocktails(q) {
  const grid = document.getElementById('swap-ctail-grid');
  if (!grid) return;
  grid.querySelectorAll('.swap-chip').forEach(ch => {
    ch.style.display = ch.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function selectSwapCocktail(name) {
  swapSelectedCocktail = (swapSelectedCocktail === name) ? null : name;
  renderSwapByCocktail();
}

// ── MODE 3: Q&A GUIDED FLOW ──
const QA_FLOWS = [
  {q:"What are you looking to do?",opts:[
    {label:"🧊 Make a drink less bitter",next:"bitter"},
    {label:"🌿 Make it non-alcoholic",next:"na"},
    {label:"🔥 Make it stronger / bolder",next:"stronger"},
    {label:"💐 Make it more floral / lighter",next:"floral"},
    {label:"🛒 I'm missing an ingredient",next:"missing"},
    {label:"🥛 Make it vegan",next:"vegan"},
  ]},
];

const QA_PATHS = {
  bitter: () => SUBS_DB.filter(s => s.tags.includes('milder')),
  na: () => SUBS_DB.filter(s => s.tags.includes('na')),
  stronger: () => SUBS_DB.filter(s => s.tags.includes('stronger') || s.tags.includes('different')),
  floral: () => SUBS_DB.filter(s => s.to.includes('St-Germain') || s.to.includes('Elderflower') || s.to.includes('Lillet') || s.tags.includes('milder')),
  missing: null, // special handling
  vegan: () => SUBS_DB.filter(s => s.from === 'Egg White' || s.from === 'Heavy Cream'),
};

function renderSwapQA() {
  const el = document.getElementById('swap-content');
  let html = '';

  if (swapQAStep === 0) {
    const flow = QA_FLOWS[0];
    html = `<div class="swap-q">
      <div class="swap-q-text">${flow.q}</div>
      <div class="swap-q-opts">
        ${flow.opts.map(o => `<button class="swap-q-btn" onclick="answerQA('${o.next}')">${o.label}</button>`).join('')}
      </div>
    </div>`;
  } else if (swapQAStep === 'missing') {
    // Ask which ingredient they're missing
    const allFrom = [...new Set(SUBS_DB.map(s => s.from))].sort();
    html = `<div class="swap-q">
      <div class="swap-q-text">Which ingredient are you missing?</div>
      <input type="text" class="swap-search" placeholder="Search…" oninput="filterSwapIngs(this.value)" id="swap-ing-search" style="margin-bottom:8px">
      <div class="swap-grid" id="swap-ing-grid">
        ${allFrom.map(ing => `<button class="swap-chip" onclick="answerQAMissing('${ing.replace(/'/g,"\\'")}')">${ing}</button>`).join('')}
      </div>
    </div>`;
  } else if (swapQAStep === 'results') {
    const results = swapQAAnswers.results || [];
    if (results.length) {
      html = `<div class="swap-step">
        <div class="swap-step-title"><span class="swap-step-num">✓</span> Here's what you can do</div>
        <div style="margin-bottom:8px;font-size:10px;color:var(--cream3)">${results.length} substitution${results.length!==1?'s':''} found</div>
        <div class="swap-results">
          ${results.map(s => swapCardHTML(s.to, s.from, s.cocktails, s.note, s.tags, 'replace')).join('')}
        </div>
      </div>`;
    } else {
      html = `<div class="swap-empty">No substitutions found for that combination. Try a different path!</div>`;
    }
    html += `<div style="text-align:center;margin-top:16px"><button class="swap-q-btn" onclick="swapQAStep=0;swapQAAnswers={};renderSwapQA()">↩ Start Over</button></div>`;
  }

  el.innerHTML = html;
}

function answerQA(path) {
  if (path === 'missing') {
    swapQAStep = 'missing';
    renderSwapQA();
  } else {
    const results = QA_PATHS[path] ? QA_PATHS[path]() : [];
    swapQAAnswers.results = results;
    swapQAStep = 'results';
    renderSwapQA();
  }
}

function answerQAMissing(ing) {
  const results = SUBS_DB.filter(s => s.from === ing);
  swapQAAnswers.results = results;
  swapQAStep = 'results';
  renderSwapQA();
}

// ── CARD RENDERER ──
function swapCardHTML(highlight, other, cocktails, note, tags, mode) {
  const tagHTML = tags.map(t => {
    const cls = {easier:'swap-tag-easier',different:'swap-tag-different',stronger:'swap-tag-stronger',milder:'swap-tag-milder',na:'swap-tag-na'}[t]||'swap-tag-different';
    return `<span class="swap-tag ${cls}">${t}</span>`;
  }).join('');

  const cocktailLinks = cocktails.map(name =>
    `<span style="color:var(--gold);cursor:pointer;text-decoration:underline;text-decoration-style:dotted" onclick="closeSwapLab();scrollToCard('${name.replace(/'/g,"\\'")}')">${name}</span>`
  ).join(', ');

  return `<div class="swap-card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
      <div class="swap-arrow">
        <span class="swap-from">${other}</span>
        <span class="swap-arrow-icon">→</span>
        <span class="swap-to">${highlight}</span>
      </div>
      <div>${tagHTML}</div>
    </div>
    <div style="font-size:10px;color:var(--cream3);margin:6px 0">Works in: ${cocktailLinks}</div>
    <div class="swap-note">${note}</div>
  </div>`;
}


// ═══ PHOTOS TAB IMAGE LOADING ═══
function loadPhotoTabImage(cocktailName, safeName) {
  const img = document.getElementById('phi-' + safeName);
  const ph = document.getElementById('php-' + safeName);
  if (!img || img.dataset.loaded) return;
  img.dataset.loaded = '1';

  const searchName = DB_NAMES[cocktailName] || cocktailName;
  fetch('https://www.thecocktaildb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(searchName))
    .then(r => r.json())
    .then(d => {
      if (d.drinks && d.drinks[0] && d.drinks[0].strDrinkThumb) {
        const url = d.drinks[0].strDrinkThumb;
        const pre = new Image();
        pre.onload = () => {
          img.src = url;
          img.style.display = 'block';
          requestAnimationFrame(() => { img.classList.add('loaded'); });
          if (ph) ph.classList.add('hidden');
        };
        pre.src = url;
      }
    })
    .catch(() => {});

  // Also load similar cocktail thumbnails
  const heroEl = document.getElementById('phero-' + safeName);
  if (heroEl) {
    document.querySelectorAll('[id^="psi-"]').forEach(el => {
      if (el.closest('.photos-pane') && !el.dataset.loaded) {
        el.dataset.loaded = '1';
        const simName = el.id.replace('psi-','').replace(/_/g,' ');
        // Try to find matching cocktail
        const match = C.find(c => c.name.replace(/[^a-z0-9]/gi,'_') === el.id.replace('psi-',''));
        if (match) {
          const sn = DB_NAMES[match.name] || match.name;
          fetch('https://www.thecocktaildb.com/api/json/v1/1/search.php?s=' + encodeURIComponent(sn))
            .then(r=>r.json())
            .then(d => {
              if (d.drinks?.[0]?.strDrinkThumb) {
                const timg = new Image();
                timg.onload = () => {
                  el.innerHTML = '<img src="'+d.drinks[0].strDrinkThumb+'/preview" style="width:100%;height:100%;object-fit:cover">';
                };
                timg.src = d.drinks[0].strDrinkThumb + '/preview';
              }
            }).catch(()=>{});
        }
      }
    });
  }
}

function closeAllCards() {
  OPEN.forEach(name => {
    const el = document.querySelector('.card[data-name="'+name.replace(/"/g,'&quot;')+'"]');
    if (el) { el.classList.remove('open'); const body = el.querySelector('.card-body'); if(body) body.style.display='none'; el.querySelector('.arrow').style.transform=''; }
  });
  OPEN.clear();
}
